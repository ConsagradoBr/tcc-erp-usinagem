repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff (auto-fix)
        entry: ruff check --fix
        language: system
        files: "\\.py$"
      - id: black
        name: Black
        entry: black
        language: system
        files: "\\.py$"
      - id: isort
        name: isort
        entry: isort
        language: system
        files: "\\.py$"
      - id: eslint
        name: ESLint (npm)
        entry: npm run lint --silent
        language: system
        pass_filenames: false
        files: "\\.(js|jsx|ts|tsx)$"

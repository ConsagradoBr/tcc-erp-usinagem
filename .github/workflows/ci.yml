name: CI
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Node deps if present
        run: |
          if [ -f package.json ]; then npm ci --silent || npm install --no-audit --no-fund; fi
      - name: Install Python deps if present
        run: |
          if [ -f backend/requirements.txt ]; then python -m pip install --upgrade pip && pip install -r backend/requirements.txt; fi
      - name: Run linters (Node)
        run: |
          if [ -f package.json ]; then if npm run | grep -q 'lint'; then npm run lint --silent; else echo 'No lint script'; fi; fi
      - name: Install ruff and run python linter
        run: |
          if [ -f pyproject.toml ]; then python -m pip install --upgrade pip && pip install ruff && ruff check .; else echo 'No pyproject.toml, skipping ruff'; fi
      - name: Run tests (pytest)
        run: |
          pytest -q
      - name: Security scan (npm audit)
        run: |
          if [ -f package.json ]; then npm audit --audit-level=high || true; fi
